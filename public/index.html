<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wertongramm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2a 50%, #0a0a0a 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Анимация переливающегося градиента */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #2a0a3a, #4a1a6a, #2a0a3a, #6a2a8a);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }
        
        #app { display: flex; height: 100vh; }
        
        /* Боковая панель */
        .sidebar {
            width: 320px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(106, 42, 138, 0.3);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 16px;
            background: linear-gradient(135deg, #1a0a2a, #2a0a3a);
            border-bottom: 1px solid rgba(106, 42, 138, 0.5);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .sidebar-header:hover { background: linear-gradient(135deg, #2a0a3a, #3a0a4a); }
        
        .user-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-info { display: flex; align-items: center; gap: 12px; }
        
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6a2a8a, #9a4aca);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }
        
        .avatar:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(106, 42, 138, 0.5); }
        
        .username { font-weight: 600; }
        .moons { font-size: 12px; color: #c96eff; }
        .logout-btn {
            background: none;
            border: none;
            color: #c96eff;
            font-size: 20px;
            cursor: pointer;
        }
        
        /* Поиск */
        .search-area {
            padding: 12px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid rgba(106, 42, 138, 0.3);
        }
        
        .search-input {
            flex: 1;
            padding: 10px 12px;
            background: rgba(26, 10, 42, 0.8);
            border: 1px solid rgba(106, 42, 138, 0.5);
            border-radius: 24px;
            color: white;
            font-size: 14px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #9a4aca;
            box-shadow: 0 0 10px rgba(154, 74, 202, 0.3);
        }
        
        .search-btn {
            background: linear-gradient(135deg, #6a2a8a, #9a4aca);
            border: none;
            border-radius: 24px;
            padding: 10px 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .search-btn:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(154, 74, 202, 0.5); }
        
        /* Список чатов */
        .chats-list { flex: 1; overflow-y: auto; }
        
        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .chat-item:hover { background: rgba(106, 42, 138, 0.2); }
        .chat-item.active { background: rgba(106, 42, 138, 0.4); border-left: 3px solid #9a4aca; }
        
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6a2a8a, #9a4aca);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .chat-name { font-weight: 500; }
        
        /* Область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 10, 10, 0.8);
        }
        
        .chat-header {
            padding: 12px 20px;
            background: linear-gradient(135deg, #1a0a2a, #2a0a3a);
            border-bottom: 1px solid rgba(106, 42, 138, 0.5);
            font-weight: 600;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
        }
        
        .message.outgoing {
            background: linear-gradient(135deg, #2b5278, #1e3a5f);
            align-self: flex-end;
        }
        
        .message.incoming {
            background: rgba(26, 10, 42, 0.8);
            border: 1px solid rgba(106, 42, 138, 0.5);
            align-self: flex-start;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .message-sender {
            cursor: pointer;
            color: #c96eff;
        }
        
        .message-sender:hover { text-decoration: underline; }
        .message-text { margin-bottom: 4px; line-height: 1.4; }
        .message-meta {
            font-size: 10px;
            opacity: 0.6;
            text-align: right;
        }
        
        .message-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .message:hover .message-actions { opacity: 1; }
        .message-actions button {
            background: none;
            border: none;
            color: #c96eff;
            font-size: 11px;
            cursor: pointer;
        }
        
        /* Поле ввода */
        .input-area {
            padding: 12px 16px;
            background: linear-gradient(135deg, #1a0a2a, #2a0a3a);
            border-top: 1px solid rgba(106, 42, 138, 0.5);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        
        #messageInput {
            flex: 1;
            background: rgba(26, 10, 42, 0.8);
            border: 1px solid rgba(106, 42, 138, 0.5);
            border-radius: 24px;
            padding: 10px 16px;
            color: white;
            font-size: 15px;
            resize: none;
            font-family: inherit;
        }
        
        #messageInput:focus {
            outline: none;
            border-color: #9a4aca;
        }
        
        .input-area button {
            background: linear-gradient(135deg, #6a2a8a, #9a4aca);
            border: none;
            border-radius: 30px;
            padding: 10px 18px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .input-area button:hover { transform: scale(1.02); }
        .attach-btn, .gift-btn { background: rgba(106, 42, 138, 0.6) !important; }
        .gift-btn { background: linear-gradient(135deg, #ff9800, #ff5722) !important; }
        .typing-indicator {
            font-size: 12px;
            color: #c96eff;
            padding: 4px 16px;
        }
        
        /* Модальное окно профиля */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .profile-modal {
            background: linear-gradient(135deg, #1a0a2a, #2a0a3a);
            border-radius: 28px;
            width: 320px;
            max-width: 90%;
            overflow: hidden;
            border: 1px solid rgba(106, 42, 138, 0.5);
        }
        
        .profile-cover {
            background: linear-gradient(135deg, #6a2a8a, #9a4aca, #6a2a8a);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            height: 100px;
            position: relative;
        }
        
        .profile-avatar-large {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6a2a8a, #9a4aca);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 4px solid #2a0a3a;
        }
        
        .profile-info {
            padding: 48px 20px 20px;
            text-align: center;
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .profile-username {
            font-size: 14px;
            color: #c96eff;
            margin-bottom: 12px;
        }
        
        .profile-bio {
            font-size: 14px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            margin: 12px 0;
            word-wrap: break-word;
        }
        
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 16px 0;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        
        .stat { text-align: center; }
        .stat-value { font-size: 20px; font-weight: bold; color: #c96eff; }
        .stat-label { font-size: 12px; color: #8e8e8e; }
        
        .profile-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6a2a8a, #9a4aca);
            border: none;
            border-radius: 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
        }
        
        .profile-btn:hover { transform: scale(1.02); }
        .profile-btn.secondary { background: rgba(106, 42, 138, 0.6); }
        
        /* Модальное окно подарков */
        .gift-modal {
            background: linear-gradient(135deg, #1a0a2a, #2a0a3a);
            border-radius: 28px;
            width: 320px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid rgba(106, 42, 138, 0.5);
        }
        
        .gift-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(106, 42, 138, 0.3);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .gift-item:hover { background: rgba(106, 42, 138, 0.3); border-radius: 12px; }
        .gift-info { display: flex; gap: 12px; align-items: center; }
        .gift-icon { font-size: 32px; }
        .gift-price { color: #ff9800; font-size: 12px; }
        
        .convert-btn {
            background: linear-gradient(135deg, #ff9800, #ff5722);
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        
        .admin-panel { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(106, 42, 138, 0.5); }
        .admin-input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            background: rgba(26, 10, 42, 0.8);
            border: 1px solid rgba(106, 42, 138, 0.5);
            border-radius: 12px;
            color: white;
        }
        .admin-button, .close-button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: linear-gradient(135deg, #6a2a8a, #9a4aca);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }
        .close-button { background: rgba(106, 42, 138, 0.6); }
        
        /* Аутентификация */
        #auth {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a, #1a0a2a, #0a0a0a);
        }
        
        .auth-card {
            background: linear-gradient(135deg, #1a0a2a, #2a0a3a);
            padding: 32px;
            border-radius: 28px;
            width: 320px;
            border: 1px solid rgba(106, 42, 138, 0.5);
        }
        
        .auth-card h2 { text-align: center; margin-bottom: 24px; background: linear-gradient(135deg, #c96eff, #9a4aca); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card input, .auth-card textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(26, 10, 42, 0.8);
            border: 1px solid rgba(106, 42, 138, 0.5);
            border-radius: 20px;
            color: white;
        }
        .auth-card input:focus, .auth-card textarea:focus {
            outline: none;
            border-color: #9a4aca;
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: linear-gradient(135deg, #6a2a8a, #9a4aca);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .auth-card button:hover { transform: scale(1.02); }
        .auth-buttons { display: flex; gap: 10px; margin-top: 16px; }
        .auth-buttons button { flex: 1; }
        textarea { font-family: inherit; resize: none; }
        
        .error-input {
            border-color: #ff4444 !important;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }
    </style>
</head>
<body>
<div id="auth">
    <div class="auth-card">
        <h2>✨ Wertongramm ✨</h2>
        <input type="text" id="phone" placeholder="Телефон (только цифры, 10-15 символов)" pattern="[0-9]{10,15}">
        <input type="text" id="username" placeholder="Имя">
        <input type="password" id="password" placeholder="Пароль">
        <textarea id="bio" placeholder="О себе" rows="2"></textarea>
        <div class="auth-buttons">
            <button id="registerBtn">Регистрация</button>
            <button id="loginBtn">Вход</button>
        </div>
    </div>
</div>

<div id="app" style="display: none;">
    <div class="sidebar">
        <div class="sidebar-header" id="profileBtn">
            <div class="user-card">
                <div class="user-info">
                    <div class="avatar" id="currentAvatar">👤</div>
                    <div>
                        <div class="username" id="currentUsername"></div>
                        <div class="moons">🌙 <span id="moonsCount">0</span> лун</div>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn">🚪</button>
            </div>
        </div>
        
        <div class="search-area">
            <input type="text" id="searchPhone" class="search-input" placeholder="Поиск по телефону...">
            <button id="searchBtn" class="search-btn">🔍 Найти</button>
        </div>
        
        <div class="chats-list" id="chatsContainer"></div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header" id="chatHeaderName">Выберите чат</div>
        <div class="messages" id="messagesContainer"></div>
        <div class="typing-indicator" id="typingIndicator"></div>
        <div class="input-area">
            <button class="attach-btn" id="attachBtn">📎</button>
            <button class="gift-btn" id="giftBtn">🎁</button>
            <textarea id="messageInput" placeholder="Сообщение" rows="1"></textarea>
            <button id="sendBtn">➤</button>
            <input type="file" id="fileInput" style="display: none;">
        </div>
    </div>
</div>

<!-- Модальное окно профиля -->
<div id="profileModal" class="modal">
    <div class="profile-modal">
        <div class="profile-cover">
            <div class="profile-avatar-large" id="profileAvatarLarge">👤</div>
        </div>
        <div class="profile-info">
            <div class="profile-name" id="profileName"></div>
            <div class="profile-username" id="profileUsername"></div>
            <div class="profile-bio" id="profileBio"></div>
            <div class="profile-stats">
                <div class="stat">
                    <div class="stat-value" id="profileMoons">0</div>
                    <div class="stat-label">🌙 Лун</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="profileGiftsCount">0</div>
                    <div class="stat-label">🎁 Подарков</div>
                </div>
            </div>
            <button id="profileGiftsBtn" class="profile-btn">🎁 Мои подарки</button>
            <button id="profileMessageBtn" class="profile-btn">💬 Написать сообщение</button>
            <button id="closeProfileBtn" class="profile-btn secondary">Закрыть</button>
        </div>
    </div>
</div>

<!-- Модальное окно подарков пользователя -->
<div id="userGiftsModal" class="modal">
    <div class="gift-modal">
        <div style="font-size: 20px; font-weight: 600; margin-bottom: 16px;">🎁 Мои подарки</div>
        <div id="userGiftsList"></div>
        <button id="closeUserGiftsBtn" class="close-button">Закрыть</button>
    </div>
</div>

<!-- Модальное окно для отправки подарков -->
<div id="giftModal" class="modal">
    <div class="gift-modal">
        <div style="font-size: 20px; font-weight: 600; margin-bottom: 16px;">🎁 Выберите подарок</div>
        <div id="giftsList"></div>
        <div id="adminPanel" style="display: none;">
            <div style="font-size: 16px; margin: 16px 0 8px;">👑 Админ-панель</div>
            <input type="text" id="adminUserId" class="admin-input" placeholder="ID пользователя">
            <input type="number" id="adminMoonsAmount" class="admin-input" placeholder="Луны">
            <button id="adminAddMoonsBtn" class="admin-button">Выдать луны</button>
        </div>
        <button id="closeModalBtn" class="close-button">Закрыть</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket;
let currentChatId = null;
let currentUser = null;
let allGifts = [];

// DOM элементы
const authDiv = document.getElementById('auth');
const appDiv = document.getElementById('app');
const chatsContainer = document.getElementById('chatsContainer');
const messagesContainer = document.getElementById('messagesContainer');
const chatHeaderName = document.getElementById('chatHeaderName');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const attachBtn = document.getElementById('attachBtn');
const giftBtn = document.getElementById('giftBtn');
const fileInput = document.getElementById('fileInput');
const typingIndicator = document.getElementById('typingIndicator');
const currentAvatar = document.getElementById('currentAvatar');
const currentUsername = document.getElementById('currentUsername');
const moonsCount = document.getElementById('moonsCount');
const logoutBtn = document.getElementById('logoutBtn');
const searchPhone = document.getElementById('searchPhone');
const searchBtn = document.getElementById('searchBtn');
const giftModal = document.getElementById('giftModal');
const giftsList = document.getElementById('giftsList');
const adminPanel = document.getElementById('adminPanel');
const profileModal = document.getElementById('profileModal');
const profileAvatarLarge = document.getElementById('profileAvatarLarge');
const profileName = document.getElementById('profileName');
const profileUsername = document.getElementById('profileUsername');
const profileBio = document.getElementById('profileBio');
const profileMoons = document.getElementById('profileMoons');
const profileGiftsCount = document.getElementById('profileGiftsCount');
const profileMessageBtn = document.getElementById('profileMessageBtn');
const profileGiftsBtn = document.getElementById('profileGiftsBtn');
const closeProfileBtn = document.getElementById('closeProfileBtn');
const profileBtn = document.getElementById('profileBtn');
const userGiftsModal = document.getElementById('userGiftsModal');
const userGiftsList = document.getElementById('userGiftsList');
const closeUserGiftsBtn = document.getElementById('closeUserGiftsBtn');

let selectedUserId = null;

function getToken() { return localStorage.getItem('token'); }
function setToken(t) { localStorage.setItem('token', t); }
function clearToken() { localStorage.removeItem('token'); }

// Проверка телефона
function validatePhone(phone) {
    const phoneRegex = /^[0-9]{10,15}$/;
    return phoneRegex.test(phone);
}

// Регистрация с проверкой телефона
document.getElementById('registerBtn').onclick = async () => {
    const phone = document.getElementById('phone').value;
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const bio = document.getElementById('bio').value;
    
    if (!validatePhone(phone)) {
        document.getElementById('phone').classList.add('error-input');
        alert('❌ Телефон должен содержать только цифры (10-15 символов)');
        setTimeout(() => document.getElementById('phone').classList.remove('error-input'), 2000);
        return;
    }
    document.getElementById('phone').classList.remove('error-input');
    
    if (!password) {
        alert('❌ Введите пароль');
        return;
    }
    
    const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password, username: username || phone, bio })
    });
    const data = await res.json();
    if (res.ok) {
        setToken(data.token);
        currentUser = { id: data.userId, is_admin: data.isAdmin };
        initApp();
    } else alert(data.error);
};

// Логин
document.getElementById('loginBtn').onclick = async () => {
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password })
    });
    const data = await res.json();
    if (res.ok) {
        setToken(data.token);
        currentUser = { id: data.userId, is_admin: data.isAdmin };
        initApp();
    } else alert(data.error);
};

logoutBtn.onclick = () => {
    clearToken();
    if (socket) socket.disconnect();
    authDiv.style.display = 'flex';
    appDiv.style.display = 'none';
};

async function initApp() {
    authDiv.style.display = 'none';
    appDiv.style.display = 'flex';
    await loadUserInfo();
    await loadChats();
    await loadGifts();
    connectSocket();
}

async function loadUserInfo() {
    const res = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${getToken()}` } });
    if (res.ok) {
        const user = await res.json();
        currentUser = { ...currentUser, ...user };
        currentAvatar.textContent = (user.username || user.phone)[0].toUpperCase();
        currentUsername.textContent = user.username || user.phone;
        moonsCount.textContent = user.moons;
        if (user.is_admin) adminPanel.style.display = 'block';
    }
}

async function loadGifts() {
    const res = await fetch('/api/gifts', { headers: { 'Authorization': `Bearer ${getToken()}` } });
    if (res.ok) allGifts = await res.json();
}

async function loadUserGifts() {
    const res = await fetch('/api/my-gifts', { headers: { 'Authorization': `Bearer ${getToken()}` } });
    if (res.ok) return await res.json();
    return [];
}

async function loadChats() {
    const res = await fetch('/api/chats', { headers: { 'Authorization': `Bearer ${getToken()}` } });
    if (res.ok) renderChatList(await res.json());
}

function renderChatList(chats) {
    chatsContainer.innerHTML = '';
    for (const chat of chats) {
        let title = chat.title;
        let avatar = '💬';
        if (chat.type === 'direct') {
            const other = chat.members.find(m => m.userId != currentUser.id);
            title = other ? other.username || other.userId : 'Unknown';
            avatar = (title[0] || '💬').toUpperCase();
        } else if (chat.title === 'Новички') {
            avatar = '👋';
        }
        const div = document.createElement('div');
        div.className = 'chat-item';
        div.dataset.chatId = chat.id;
        div.innerHTML = `<div class="chat-avatar">${avatar}</div>
                         <div class="chat-name">${escapeHtml(title)}</div>`;
        div.onclick = () => openChat(chat.id);
        chatsContainer.appendChild(div);
    }
}

async function openChat(chatId) {
    currentChatId = chatId;
    const res = await fetch(`/api/messages/${chatId}`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
    if (res.ok) renderMessages(await res.json());
    const chatRes = await fetch(`/api/chat/${chatId}`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
    if (chatRes.ok) {
        const chat = await chatRes.json();
        let title = chat.title;
        if (chat.type === 'direct') {
            const other = chat.members.find(m => m.userId != currentUser.id);
            title = other ? other.username || other.userId : 'Unknown';
        }
        chatHeaderName.textContent = title;
        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
        const active = document.querySelector(`.chat-item[data-chat-id="${chatId}"]`);
        if (active) active.classList.add('active');
    }
}

function renderMessages(messages) {
    messagesContainer.innerHTML = '';
    for (const msg of messages) {
        const isOutgoing = msg.sender_id === currentUser.id;
        const div = document.createElement('div');
        div.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
        div.dataset.id = msg.id;
        
        let senderHtml = '';
        if (!isOutgoing && msg.username && msg.username !== currentUser.username) {
            senderHtml = `<div class="message-header">
                <span class="message-sender" data-user-id="${msg.sender_id}">${escapeHtml(msg.username)}</span>
            </div>`;
        }
        
        let giftHtml = '';
        if (msg.gift_id && msg.gift_name) {
            giftHtml = `<div style="margin: 4px 0;">🎁 ${msg.gift_name} ${msg.gift_icon || ''}</div>`;
        }
        
        div.innerHTML = `${senderHtml}
            <div class="message-text">${escapeHtml(msg.text || '')}${giftHtml}</div>
            <div class="message-meta">${new Date(msg.created_at).toLocaleTimeString()}</div>
            ${isOutgoing ? `<div class="message-actions"><button class="edit-msg">✏️</button><button class="delete-msg">🗑️</button></div>` : ''}`;
        
        if (!isOutgoing) {
            const senderSpan = div.querySelector('.message-sender');
            if (senderSpan) {
                senderSpan.onclick = () => showUserProfile(parseInt(senderSpan.dataset.userId));
            }
        }
        
        if (isOutgoing) {
            const editBtn = div.querySelector('.edit-msg');
            const delBtn = div.querySelector('.delete-msg');
            if (editBtn) editBtn.onclick = () => editMessage(msg.id, msg.text);
            if (delBtn) delBtn.onclick = () => deleteMessage(msg.id);
        }
        messagesContainer.appendChild(div);
    }
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

async function showUserProfile(userId) {
    const token = getToken();
    const res = await fetch(`/api/user/${userId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) {
        const user = await res.json();
        selectedUserId = user.id;
        profileAvatarLarge.textContent = (user.username || 'U')[0].toUpperCase();
        profileName.textContent = user.username || `User ${user.id}`;
        profileUsername.textContent = `@${user.username || user.id}`;
        profileBio.textContent = user.bio || 'Нет информации о себе';
        profileMoons.textContent = user.moons;
        
        const gifts = await loadUserGifts();
        profileGiftsCount.textContent = gifts.length;
        
        profileModal.style.display = 'flex';
    }
}

profileBtn.onclick = () => showUserProfile(currentUser.id);

profileGiftsBtn.onclick = async () => {
    const gifts = await loadUserGifts();
    userGiftsList.innerHTML = '';
    if (gifts.length === 0) {
        userGiftsList.innerHTML = '<div style="text-align:center; padding:20px;">У вас пока нет подарков</div>';
    } else {
        for (const g of gifts) {
            const div = document.createElement('div');
            div.className = 'gift-item';
            div.innerHTML = `
                <div class="gift-info">
                    <div class="gift-icon">${g.icon}</div>
                    <div>
                        <div>${g.name}</div>
                        <div class="gift-price">🌙 ${g.price} лун</div>
                        ${g.from_username ? `<div style="font-size:10px; color:#c96eff;">от ${escapeHtml(g.from_username)}</div>` : ''}
                    </div>
                </div>
                <button class="convert-btn" data-id="${g.id}" data-price="${g.price}">💰 Конвертировать</button>
            `;
            const convertBtn = div.querySelector('.convert-btn');
            convertBtn.onclick = async (e) => {
                e.stopPropagation();
                if (confirm(`Конвертировать ${g.name} в ${g.price} лун?`)) {
                    const res = await fetch('/api/convert-gift', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ giftId: g.id })
                    });
                    if (res.ok) {
                        alert(`✅ Вы получили ${g.price} лун!`);
                        await loadUserInfo();
                        profileGiftsBtn.click();
                    } else alert('Ошибка конвертации');
                }
            };
            userGiftsList.appendChild(div);
        }
    }
    profileModal.style.display = 'none';
    userGiftsModal.style.display = 'flex';
};

closeUserGiftsBtn.onclick = () => {
    userGiftsModal.style.display = 'none';
};

profileMessageBtn.onclick = async () => {
    if (!selectedUserId) return;
    const token = getToken();
    const chatRes = await fetch('/api/chats/direct', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId2: selectedUserId })
    });
    const chat = await chatRes.json();
    if (chatRes.ok && chat.id) {
        profileModal.style.display = 'none';
        await loadChats();
        await openChat(chat.id);
    } else {
        alert('Ошибка создания чата');
    }
};

closeProfileBtn.onclick = () => {
    profileModal.style.display = 'none';
    selectedUserId = null;
};

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
function editMessage(id, old) { const newText = prompt('Редактировать:', old); if (newText && newText !== old) socket.emit('edit_message', { messageId: id, newText }); }
function deleteMessage(id) { if (confirm('Удалить?')) socket.emit('delete_message', { messageId: id }); }

sendBtn.onclick = () => {
    if (!currentChatId) return alert('Выберите чат');
    const text = messageInput.value.trim();
    if (!text) return;
    socket.emit('send_message', { chatId: currentChatId, text });
    messageInput.value = '';
};

attachBtn.onclick = () => fileInput.click();
fileInput.onchange = async () => {
    const file = fileInput.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append('file', file);
    const res = await fetch('/api/upload', { method: 'POST', headers: { 'Authorization': `Bearer ${getToken()}` }, body: formData });
    const data = await res.json();
    if (res.ok) socket.emit('send_message', { chatId: currentChatId, text: '', filePath: data.filePath });
    fileInput.value = '';
};

giftBtn.onclick = () => {
    if (!currentChatId) return alert('Выберите чат');
    giftsList.innerHTML = '';
    for (const g of allGifts) {
        const div = document.createElement('div');
        div.className = 'gift-item';
        div.innerHTML = `<div class="gift-info"><div class="gift-icon">${g.icon}</div><div><div>${g.name}</div><div class="gift-price">🌙 ${g.price}</div></div></div><div>🎁</div>`;
        div.onclick = () => sendGift(g.id);
        giftsList.appendChild(div);
    }
    giftModal.style.display = 'flex';
};

async function sendGift(giftId) {
    const token = getToken();
    const res = await fetch('/api/send-gift', { 
        method: 'POST', 
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ giftId, chatId: currentChatId }) 
    });
    const data = await res.json();
    if (res.ok) { 
        giftModal.style.display = 'none'; 
        await loadUserInfo();
    } else {
        alert(data.error || 'Ошибка при отправке подарка');
    }
}

searchBtn.onclick = async () => {
    const phone = searchPhone.value.trim();
    if (!phone) return alert('Введите телефон');
    const token = getToken();
    try {
        const res = await fetch(`/api/user/by-phone/${phone}`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (res.status === 404) return alert('❌ Пользователь не найден');
        if (!res.ok) return alert('Ошибка поиска');
        const user = await res.json();
        if (!user || !user.id) return alert('Пользователь не найден');
        const chatRes = await fetch('/api/chats/direct', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId2: user.id })
        });
        const chat = await chatRes.json();
        if (chatRes.ok && chat.id) {
            alert(`✅ Чат с ${user.username || user.id} создан!`);
            await loadChats();
            await openChat(chat.id);
            searchPhone.value = '';
        } else alert('Ошибка создания чата');
    } catch (error) { alert('Ошибка соединения'); }
};

searchPhone.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBtn.click(); });

document.getElementById('adminAddMoonsBtn').onclick = async () => {
    const userId = document.getElementById('adminUserId').value;
    const amount = document.getElementById('adminMoonsAmount').value;
    if (!userId || !amount) return alert('Введите ID и количество');
    const res = await fetch('/api/admin/add-moons', { method: 'POST', headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: parseInt(userId), amount: parseInt(amount) }) });
    const data = await res.json();
    if (res.ok) { alert(`Выдано ${amount} лун`); loadUserInfo(); }
    else alert(data.error);
};

document.getElementById('closeModalBtn').onclick = () => giftModal.style.display = 'none';

messageInput.addEventListener('input', () => {
    if (!currentChatId) return;
    socket.emit('typing', { chatId: currentChatId });
    if (window.typingTimeout) clearTimeout(window.typingTimeout);
    window.typingTimeout = setTimeout(() => {}, 1000);
});

function connectSocket() {
    socket = io({ auth: { token: getToken() } });
    socket.on('connect', () => console.log('Socket connected'));
    socket.on('new_message', (msg) => {
        if (currentChatId == msg.chat_id) {
            const isOutgoing = msg.sender_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            div.dataset.id = msg.id;
            let senderHtml = '';
            if (!isOutgoing && msg.username && msg.username !== currentUser.username) {
                senderHtml = `<div class="message-header"><span class="message-sender" data-user-id="${msg.sender_id}">${escapeHtml(msg.username)}</span></div>`;
            }
            let giftHtml = '';
            if (msg.gift_id && msg.gift_name) {
                giftHtml = `<div style="margin: 4px 0;">🎁 ${msg.gift_name} ${msg.gift_icon || ''}</div>`;
            }
            div.innerHTML = `${senderHtml}<div class="message-text">${escapeHtml(msg.text || '')}${giftHtml}</div><div class="message-meta">${new Date(msg.created_at).toLocaleTimeString()}</div>${isOutgoing ? `<div class="message-actions"><button class="edit-msg">✏️</button><button class="delete-msg">🗑️</button></div>` : ''}`;
            if (!isOutgoing) {
                const senderSpan = div.querySelector('.message-sender');
                if (senderSpan) senderSpan.onclick = () => showUserProfile(parseInt(senderSpan.dataset.userId));
            }
            if (isOutgoing) {
                const editBtn = div.querySelector('.edit-msg');
                const delBtn = div.querySelector('.delete-msg');
                if (editBtn) editBtn.onclick = () => editMessage(msg.id, msg.text);
                if (delBtn) delBtn.onclick = () => deleteMessage(msg.id);
            }
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        loadChats();
    });
    socket.on('message_edited', ({ messageId, newText }) => {
        const d = messagesContainer.querySelector(`.message[data-id="${messageId}"]`);
        if (d) { const t = d.querySelector('.message-text'); if (t) t.innerHTML = escapeHtml(newText); }
    });
    socket.on('message_deleted', ({ messageId }) => {
        const d = messagesContainer.querySelector(`.message[data-id="${messageId}"]`);
        if (d) d.innerHTML = '<div class="message-text">[Удалено]</div>';
    });
    socket.on('user_typing', ({ userId, chatId }) => {
        if (chatId === currentChatId && userId !== currentUser.id) {
            typingIndicator.textContent = 'Печатает...';
            setTimeout(() => typingIndicator.textContent = '', 2000);
        }
    });
    socket.on('moons_updated', ({ userId, moons }) => { if (userId === currentUser.id) moonsCount.textContent = moons; });
}
</script>
