<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wertongramm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }
        
        :root {
            --bg-color: #0a0a0a;
            --sidebar-bg: #111111;
            --header-bg: #1f1f1f;
            --message-outgoing: #2b5278;
            --message-incoming: #1f1f1f;
            --input-bg: #1f1f1f;
            --accent: #2c6bff;
            --accent-hover: #1e4fcc;
            --text-color: #ffffff;
            --text-secondary: #8e8e8e;
            --border-color: #2c2c2c;
        }
        
        #app {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 16px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
        }
        
        .user-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #4a90e2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }
        
        .user-details {
            display: flex;
            flex-direction: column;
        }
        
        .username {
            font-weight: 600;
            font-size: 16px;
        }
        
        .moons {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .logout-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }
        
        .search-area {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }
        
        .search-input {
            flex: 1;
            padding: 10px 12px;
            background: var(--input-bg);
            border: none;
            border-radius: 24px;
            color: var(--text-color);
            font-size: 14px;
        }
        
        .search-btn {
            background: var(--accent);
            border: none;
            border-radius: 24px;
            padding: 10px 16px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .chat-item.active {
            background: rgba(44, 107, 255, 0.2);
        }
        
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .chat-info {
            flex: 1;
        }
        
        .chat-name {
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .chat-preview {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
        }
        
        .chat-header {
            padding: 12px 20px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .chat-header-info {
            flex: 1;
        }
        
        .chat-header-name {
            font-weight: 600;
        }
        
        .chat-header-status {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            position: relative;
        }
        
        .message.outgoing {
            background: var(--message-outgoing);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message.incoming {
            background: var(--message-incoming);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message-text {
            margin-bottom: 4px;
            line-height: 1.4;
        }
        
        .message-gift {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 12px;
            margin-top: 4px;
        }
        
        .message-meta {
            font-size: 10px;
            opacity: 0.6;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 4px;
        }
        
        .message-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .message:hover .message-actions {
            opacity: 1;
        }
        
        .message-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
        }
        
        .input-area {
            padding: 12px 16px;
            background: var(--header-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        
        #messageInput {
            flex: 1;
            background: var(--input-bg);
            border: none;
            border-radius: 24px;
            padding: 10px 16px;
            color: var(--text-color);
            font-size: 15px;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }
        
        .input-area button {
            background: var(--accent);
            border: none;
            border-radius: 30px;
            padding: 10px 18px;
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }
        
        .attach-btn {
            background: var(--input-bg) !important;
        }
        
        .gift-btn {
            background: linear-gradient(135deg, #ff9800, #ff5722) !important;
        }
        
        .typing-indicator {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 4px 16px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: var(--sidebar-bg);
            border-radius: 20px;
            max-width: 90%;
            width: 320px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .gift-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .gift-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .gift-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .gift-icon {
            font-size: 32px;
        }
        
        .gift-name {
            font-weight: 500;
        }
        
        .gift-price {
            font-size: 12px;
            color: #ff9800;
        }
        
        .admin-panel {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        
        .admin-input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            color: var(--text-color);
        }
        
        .admin-button {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }
        
        .close-button {
            width: 100%;
            margin-top: 16px;
            padding: 10px;
            background: #2c2c2c;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }
        
        #auth {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0a0a0a;
        }
        
        .auth-card {
            background: #1f1f1f;
            padding: 32px;
            border-radius: 28px;
            width: 320px;
        }
        
        .auth-card h2 {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #2c2c2c;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 16px;
        }
        
        .auth-card button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: var(--accent);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .auth-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        
        .auth-buttons button {
            flex: 1;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                z-index: 100;
                transition: left 0.3s;
                width: 280px;
            }
            
            .sidebar.open {
                left: 0;
            }
        }
    </style>
</head>
<body>
<div id="auth">
    <div class="auth-card">
        <h2>📱 Wertongramm</h2>
        <input type="text" id="phone" placeholder="Телефон или имя">
        <input type="text" id="username" placeholder="Имя (при регистрации)">
        <input type="password" id="password" placeholder="Пароль">
        <div class="auth-buttons">
            <button id="registerBtn">Регистрация</button>
            <button id="loginBtn">Вход</button>
        </div>
    </div>
</div>

<div id="app" style="display: none;">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="user-card">
                <div class="user-info">
                    <div class="avatar" id="currentAvatar"></div>
                    <div class="user-details">
                        <div class="username" id="currentUsername"></div>
                        <div class="moons">🌙 <span id="moonsCount">0</span> лун</div>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn">🚪</button>
            </div>
        </div>
        <div class="search-area">
            <input type="text" id="searchPhone" class="search-input" placeholder="Введите телефон для поиска...">
            <button id="searchBtn" class="search-btn">🔍 Найти</button>
        </div>
        <div class="chats-list" id="chatsContainer"></div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-avatar" id="chatAvatar">💬</div>
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatHeaderName">Выберите чат</div>
                <div class="chat-header-status" id="chatHeaderStatus"></div>
            </div>
        </div>
        <div class="messages" id="messagesContainer"></div>
        <div class="typing-indicator" id="typingIndicator"></div>
        <div class="input-area">
            <button class="attach-btn" id="attachBtn">📎</button>
            <button class="gift-btn" id="giftBtn">🎁</button>
            <textarea id="messageInput" placeholder="Сообщение" rows="1"></textarea>
            <button id="sendBtn">➤</button>
            <input type="file" id="fileInput" style="display: none;">
        </div>
    </div>
</div>

<div id="giftModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">🎁 Подарить подарок</div>
        <div id="giftsList"></div>
        <div id="adminPanel" style="display: none;" class="admin-panel">
            <div class="modal-header" style="font-size: 16px;">👑 Админ-панель</div>
            <input type="text" id="adminUserId" class="admin-input" placeholder="ID пользователя">
            <input type="number" id="adminMoonsAmount" class="admin-input" placeholder="Количество лун">
            <button id="adminAddMoonsBtn" class="admin-button">➕ Выдать луны</button>
        </div>
        <button id="closeModalBtn" class="close-button">Закрыть</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket;
let currentChatId = null;
let currentUser = null;
let allGifts = [];
let typingTimeout = null;

// DOM элементы
const authDiv = document.getElementById('auth');
const appDiv = document.getElementById('app');
const sidebar = document.getElementById('sidebar');
const chatsContainer = document.getElementById('chatsContainer');
const messagesContainer = document.getElementById('messagesContainer');
const chatHeaderName = document.getElementById('chatHeaderName');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const attachBtn = document.getElementById('attachBtn');
const giftBtn = document.getElementById('giftBtn');
const fileInput = document.getElementById('fileInput');
const typingIndicator = document.getElementById('typingIndicator');
const currentAvatar = document.getElementById('currentAvatar');
const currentUsername = document.getElementById('currentUsername');
const moonsCount = document.getElementById('moonsCount');
const logoutBtn = document.getElementById('logoutBtn');
const searchPhone = document.getElementById('searchPhone');
const searchBtn = document.getElementById('searchBtn');
const giftModal = document.getElementById('giftModal');
const giftsList = document.getElementById('giftsList');
const adminPanel = document.getElementById('adminPanel');

function setToken(token) { localStorage.setItem('token', token); }
function getToken() { return localStorage.getItem('token'); }
function clearToken() { localStorage.removeItem('token'); }

// Регистрация
document.getElementById('registerBtn').onclick = async () => {
    const phone = document.getElementById('phone').value;
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    if (!phone || !password) {
        alert('Телефон и пароль обязательны');
        return;
    }
    const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password, username: username || phone })
    });
    const data = await res.json();
    if (res.ok) {
        setToken(data.token);
        currentUser = { id: data.userId, is_admin: data.isAdmin };
        await initApp();
    } else {
        alert(data.error);
    }
};

// Логин
document.getElementById('loginBtn').onclick = async () => {
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    if (!phone || !password) {
        alert('Телефон и пароль обязательны');
        return;
    }
    const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password })
    });
    const data = await res.json();
    if (res.ok) {
        setToken(data.token);
        currentUser = { id: data.userId, is_admin: data.isAdmin };
        await initApp();
    } else {
        alert(data.error);
    }
};

logoutBtn.onclick = () => {
    clearToken();
    if (socket) socket.disconnect();
    authDiv.style.display = 'flex';
    appDiv.style.display = 'none';
};

async function initApp() {
    authDiv.style.display = 'none';
    appDiv.style.display = 'flex';
    await loadUserInfo();
    await loadChats();
    await loadGifts();
    connectSocket();
}

async function loadUserInfo() {
    const token = getToken();
    const res = await fetch('/api/me', {
        headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) {
        const user = await res.json();
        currentUser = { ...currentUser, ...user };
        currentAvatar.textContent = (user.username || user.phone)[0].toUpperCase();
        currentUsername.textContent = user.username || user.phone;
        moonsCount.textContent = user.moons;
        
        if (user.is_admin) {
            adminPanel.style.display = 'block';
        }
    }
}

async function loadGifts() {
    const token = getToken();
    const res = await fetch('/api/gifts', {
        headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) {
        allGifts = await res.json();
    }
}

async function loadChats() {
    const token = getToken();
    const res = await fetch('/api/chats', {
        headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) {
        const chats = await res.json();
        renderChatList(chats);
    }
}

function renderChatList(chats) {
    chatsContainer.innerHTML = '';
    for (const chat of chats) {
        const div = document.createElement('div');
        div.className = 'chat-item';
        div.dataset.chatId = chat.id;
        let title = chat.title;
        let avatar = '💬';
        if (chat.type === 'direct') {
            const other = chat.members.find(m => m.userId != currentUser.id);
            title = other ? other.username || other.userId : 'Unknown';
            avatar = (title[0] || '💬').toUpperCase();
        }
        div.innerHTML = `
            <div class="chat-avatar">${avatar}</div>
            <div class="chat-info">
                <div class="chat-name">${escapeHtml(title)}</div>
                <div class="chat-preview"></div>
            </div>
        `;
        div.onclick = () => openChat(chat.id);
        chatsContainer.appendChild(div);
    }
}

async function openChat(chatId) {
    currentChatId = chatId;
    const token = getToken();
    const res = await fetch(`/api/messages/${chatId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) {
        const messages = await res.json();
        renderMessages(messages);
    }
    
    const chatInfo = await fetch(`/api/chat/${chatId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
    });
    if (chatInfo.ok) {
        const chat = await chatInfo.json();
        let title = chat.title;
        if (chat.type === 'direct') {
            const other = chat.members.find(m => m.userId != currentUser.id);
            title = other ? other.username || other.userId : 'Unknown';
        }
        chatHeaderName.textContent = title;
        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
        const activeEl = document.querySelector(`.chat-item[data-chat-id="${chatId}"]`);
        if (activeEl) activeEl.classList.add('active');
    }
}

function renderMessages(messages) {
    messagesContainer.innerHTML = '';
    for (const msg of messages) {
        const isOutgoing = msg.sender_id === currentUser.id;
        const div = document.createElement('div');
        div.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
        div.dataset.id = msg.id;
        
        let content = `<div class="message-text">${escapeHtml(msg.text || '')}</div>`;
        if (msg.gift_id && msg.gift_name) {
            content += `<div class="message-gift">🎁 ${msg.gift_name} ${msg.gift_icon || '🎁'}</div>`;
        }
        if (msg.file_path) {
            content += `<div><a href="${msg.file_path}" target="_blank" style="color: var(--accent);">📎 Файл</a></div>`;
        }
        content += `<div class="message-meta">
            ${msg.edited ? '<span>(ред.)</span>' : ''}
            ${new Date(msg.created_at).toLocaleTimeString()}
        </div>`;
        
        if (isOutgoing) {
            content += `<div class="message-actions">
                <button class="edit-msg">✏️</button>
                <button class="delete-msg">🗑️</button>
            </div>`;
        }
        
        div.innerHTML = content;
        if (isOutgoing) {
            const editBtn = div.querySelector('.edit-msg');
            const delBtn = div.querySelector('.delete-msg');
            if (editBtn) editBtn.onclick = () => editMessage(msg.id, msg.text);
            if (delBtn) delBtn.onclick = () => deleteMessage(msg.id);
        }
        messagesContainer.appendChild(div);
    }
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function editMessage(messageId, oldText) {
    const newText = prompt('Редактировать сообщение:', oldText);
    if (newText && newText !== oldText) {
        socket.emit('edit_message', { messageId, newText });
    }
}

function deleteMessage(messageId) {
    if (confirm('Удалить сообщение?')) {
        socket.emit('delete_message', { messageId });
    }
}

sendBtn.onclick = () => {
    if (!currentChatId) {
        alert('Сначала выберите чат');
        return;
    }
    const text = messageInput.value.trim();
    if (!text) return;
    socket.emit('send_message', { chatId: currentChatId, text });
    messageInput.value = '';
};

attachBtn.onclick = () => fileInput.click();
fileInput.onchange = async () => {
    const file = fileInput.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append('file', file);
    const token = getToken();
    const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
    });
    const data = await res.json();
    if (res.ok) {
        socket.emit('send_message', { chatId: currentChatId, text: '', filePath: data.filePath });
    } else {
        alert('Ошибка загрузки файла');
    }
    fileInput.value = '';
};

giftBtn.onclick = () => {
    if (!currentChatId) {
        alert('Сначала выберите чат');
        return;
    }
    renderGiftModal();
    giftModal.style.display = 'flex';
};

function renderGiftModal() {
    giftsList.innerHTML = '';
    for (const gift of allGifts) {
        const div = document.createElement('div');
        div.className = 'gift-item';
        div.innerHTML = `
            <div class="gift-info">
                <div class="gift-icon">${gift.icon}</div>
                <div>
                    <div class="gift-name">${gift.name}</div>
                    <div class="gift-price">🌙 ${gift.price} лун</div>
                </div>
            </div>
            <div>🎁</div>
        `;
        div.onclick = () => sendGift(gift.id);
        giftsList.appendChild(div);
    }
}

async function sendGift(giftId) {
    const token = getToken();
    const res = await fetch('/api/send-gift', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ toUserId: null, giftId, chatId: currentChatId })
    });
    const data = await res.json();
    if (res.ok) {
        giftModal.style.display = 'none';
        await loadUserInfo();
    } else {
        alert(data.error || 'Ошибка при отправке подарка');
    }
}

// ПОИСК ПОЛЬЗОВАТЕЛЯ И СОЗДАНИЕ ЧАТА
searchBtn.onclick = async () => {
    const phone = searchPhone.value.trim();
    if (!phone) {
        alert('Введите телефон для поиска');
        return;
    }
    
    const token = getToken();
    if (!token) {
        alert('Вы не авторизованы');
        return;
    }
    
    try {
        // Ищем пользователя по телефону
        const res = await fetch(`/api/user/by-phone/${phone}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (res.status === 404) {
            alert('❌ Пользователь с таким телефоном не найден');
            return;
        }
        
        if (!res.ok) {
            alert('Ошибка при поиске пользователя');
            return;
        }
        
        const user = await res.json();
        
        if (!user || !user.id) {
            alert('Пользователь не найден');
            return;
        }
        
        // Создаём чат
        const chatRes = await fetch('/api/chats/direct', {
            method: 'POST',
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ userId2: user.id })
        });
        
        const chat = await chatRes.json();
        
        if (chatRes.ok && chat.id) {
            alert(`✅ Чат с ${user.username || user.id} создан!`);
            // Обновляем список чатов и открываем новый
            await loadChats();
            await openChat(chat.id);
            searchPhone.value = '';
        } else {
            alert('Ошибка при создании чата: ' + (chat.error || 'неизвестная ошибка'));
        }
    } catch (error) {
        console.error('Ошибка:', error);
        alert('Ошибка соединения с сервером');
    }
};

// Поиск по Enter
searchPhone.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        searchBtn.click();
    }
});

// Админ: выдача лун
document.getElementById('adminAddMoonsBtn').onclick = async () => {
    const userId = document.getElementById('adminUserId').value;
    const amount = document.getElementById('adminMoonsAmount').value;
    if (!userId || !amount) {
        alert('Введите ID пользователя и количество лун');
        return;
    }
    const token = getToken();
    const res = await fetch('/api/admin/add-moons', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: parseInt(userId), amount: parseInt(amount) })
    });
    const data = await res.json();
    if (res.ok) {
        alert(`✅ Выдано ${amount} лун пользователю ${data.user.username}`);
        document.getElementById('adminUserId').value = '';
        document.getElementById('adminMoonsAmount').value = '';
        await loadUserInfo();
    } else {
        alert(data.error);
    }
};

document.getElementById('closeModalBtn').onclick = () => {
    giftModal.style.display = 'none';
};

messageInput.addEventListener('input', () => {
    if (!currentChatId) return;
    socket.emit('typing', { chatId: currentChatId });
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {}, 1000);
});

function connectSocket() {
    const token = getToken();
    socket = io({ auth: { token } });
    socket.on('connect', () => console.log('Socket connected'));
    socket.on('new_message', (msg) => {
        if (currentChatId == msg.chat_id) {
            const isOutgoing = msg.sender_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            div.dataset.id = msg.id;
            let content = `<div class="message-text">${escapeHtml(msg.text || '')}</div>`;
            if (msg.gift_id && msg.gift_name) {
                content += `<div class="message-gift">🎁 ${msg.gift_name}</div>`;
            }
            content += `<div class="message-meta">${new Date(msg.created_at).toLocaleTimeString()}</div>`;
            if (isOutgoing) {
                content += `<div class="message-actions">
                    <button class="edit-msg">✏️</button>
                    <button class="delete-msg">🗑️</button>
                </div>`;
            }
            div.innerHTML = content;
            if (isOutgoing) {
                const editBtn = div.querySelector('.edit-msg');
                const delBtn = div.querySelector('.delete-msg');
                if (editBtn) editBtn.onclick = () => editMessage(msg.id, msg.text);
                if (delBtn) delBtn.onclick = () => deleteMessage(msg.id);
            }
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        loadChats();
    });
    socket.on('message_edited', ({ messageId, newText }) => {
        const msgDiv = messagesContainer.querySelector(`.message[data-id="${messageId}"]`);
        if (msgDiv) {
            const textDiv = msgDiv.querySelector('.message-text');
            if (textDiv) textDiv.innerHTML = escapeHtml(newText);
        }
    });
    socket.on('message_deleted', ({ messageId }) => {
        const msgDiv = messagesContainer.querySelector(`.message[data-id="${messageId}"]`);
        if (msgDiv) {
            msgDiv.style.opacity = '0.5';
            msgDiv.innerHTML = '<div class="message-text">[Сообщение удалено]</div>';
        }
    });
    socket.on('user_typing', ({ userId, chatId }) => {
        if (chatId === currentChatId && userId !== currentUser.id) {
            typingIndicator.textContent = 'Печатает...';
            setTimeout(() => { typingIndicator.textContent = ''; }, 2000);
        }
    });
    socket.on('moons_updated', ({ userId, moons }) => {
        if (userId === currentUser.id) {
            moonsCount.textContent = moons;
        }
    });
}
</script>
